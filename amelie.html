<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pour Amélie ♡</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400;1,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --rose-pale: #fce7eb;
    --rose-poudre: #f5b8c4;
    --rose-vif: #e84a6a;
    --rouge-profond: #8a1538;
    --creme: #fdf6f0;
    --noir-doux: #2a1419;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { overflow-x: hidden; min-height: 100vh; }

  body {
    background: 
      radial-gradient(ellipse at 20% 20%, rgba(232, 74, 106, 0.18) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(138, 21, 56, 0.15) 0%, transparent 50%),
      linear-gradient(135deg, var(--creme) 0%, var(--rose-pale) 100%);
    font-family: 'Inter', sans-serif;
    position: relative;
    padding: 3rem 1.5rem;
    opacity: 0;
    animation: fadeIn 1.2s ease forwards;
  }

  @keyframes fadeIn { to { opacity: 1; } }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.4'/%3E%3C/svg%3E");
    opacity: 0.08;
    pointer-events: none;
    z-index: 1;
  }

  .hearts-bg {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 0;
    overflow: hidden;
  }

  .heart-float {
    position: absolute;
    color: var(--rose-vif);
    user-select: none;
    will-change: transform;
  }

  .content {
    position: relative; z-index: 3;
    max-width: 1000px; margin: 0 auto;
    text-align: center;
  }

  .header {
    margin-bottom: 4rem;
    opacity: 0;
    animation: slideDown 1s ease 0.3s forwards;
  }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .ornement {
    font-family: 'Cormorant Garamond', serif;
    color: var(--rose-vif);
    font-size: 1.5rem;
    letter-spacing: 0.5em;
    margin-bottom: 1rem;
  }

  .main-title {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic; font-weight: 400;
    font-size: clamp(2.5rem, 7vw, 4.5rem);
    color: var(--rouge-profond);
    line-height: 1.1;
    margin-bottom: 1.5rem;
    letter-spacing: -0.02em;
  }

  .main-title .accent { color: var(--rose-vif); font-weight: 500; }

  .subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(1.1rem, 2.5vw, 1.4rem);
    color: var(--noir-doux);
    max-width: 600px; margin: 0 auto;
    line-height: 1.6;
    opacity: 0.85;
  }

  .documents {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 2.5rem;
    max-width: 800px;
    margin: 0 auto 4rem;
    opacity: 0;
    animation: slideUp 1s ease 0.7s forwards;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(40px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .doc-card {
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 2.5rem 2rem;
    box-shadow: 0 10px 40px rgba(232, 74, 106, 0.15), 0 2px 10px rgba(138, 21, 56, 0.08);
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    cursor: pointer;
    color: inherit;
    display: block;
    position: relative;
    overflow: hidden;
    border: 1px solid rgba(245, 184, 196, 0.4);
    font-family: inherit;
    width: 100%;
    text-align: center;
  }

  .doc-card::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(232, 74, 106, 0.05) 0%, transparent 60%);
    opacity: 0;
    transition: opacity 0.4s ease;
  }

  .doc-card:hover {
    transform: translateY(-8px) scale(1.02);
    box-shadow: 0 20px 50px rgba(232, 74, 106, 0.25), 0 5px 15px rgba(138, 21, 56, 0.12);
  }

  .doc-card:hover::before { opacity: 1; }

  .doc-icon {
    width: 80px; height: 80px;
    margin: 0 auto 1.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, var(--rose-pale), var(--rose-poudre));
    border-radius: 50%;
    transition: transform 0.4s ease;
  }

  .doc-card:hover .doc-icon { transform: rotate(-5deg) scale(1.1); }

  .doc-icon svg { width: 40px; height: 40px; color: var(--rouge-profond); }

  .doc-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.8rem;
    color: var(--rouge-profond);
    margin-bottom: 0.5rem;
    font-weight: 500;
  }

  .doc-subtitle {
    font-size: 0.85rem;
    color: var(--noir-doux);
    opacity: 0.7;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-bottom: 1.5rem;
  }

  .doc-action {
    font-size: 0.9rem;
    color: var(--rose-vif);
    font-weight: 500;
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    transition: gap 0.3s ease;
  }

  .doc-card:hover .doc-action { gap: 0.8rem; }
  .doc-action::after { content: '→'; }

  .footer-message {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.2rem;
    color: var(--rouge-profond);
    max-width: 500px; margin: 0 auto;
    line-height: 1.6;
    opacity: 0;
    animation: fadeIn 1s ease 1.2s forwards;
  }

  .footer-message::before, .footer-message::after {
    content: '— '; color: var(--rose-vif);
  }
  .footer-message::after { content: ' —'; }

  .cursor-heart {
    position: fixed;
    pointer-events: none;
    color: var(--rose-vif);
    font-size: 14px;
    z-index: 1000;
    animation: cursorFade 1s ease forwards;
  }

  @keyframes cursorFade {
    0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -150%) scale(0.5); }
  }

  /* ===== ANIMATION D'OUVERTURE ===== */
  .opening-animation {
    position: fixed;
    inset: 0;
    z-index: 200;
    pointer-events: none;
    display: none;
    align-items: center;
    justify-content: center;
  }

  .opening-animation.active { display: flex; }

  .big-heart-wrapper {
    position: relative;
    width: 150px;
    height: 150px;
    animation: heartPulse 1.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }

  .big-heart {
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 0 40px rgba(232, 74, 106, 0.8));
  }

  @keyframes heartPulse {
    0% { transform: scale(0); opacity: 0; }
    20% { transform: scale(1.3); opacity: 1; }
    40% { transform: scale(0.9); opacity: 1; }
    60% { transform: scale(1.5); opacity: 1; }
    100% { transform: scale(25); opacity: 0; }
  }

  .burst-heart {
    position: absolute;
    color: var(--rose-vif);
    pointer-events: none;
    left: 50%;
    top: 50%;
    animation: burst 1.3s ease-out forwards;
  }

  @keyframes burst {
    0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
    100% { transform: translate(calc(-50% + var(--bx)), calc(-50% + var(--by))) scale(1.5); opacity: 0; }
  }

  /* ===== MODAL LECTEUR PDF ===== */
  .pdf-modal {
    position: fixed;
    inset: 0;
    background: rgba(42, 20, 25, 0.85);
    backdrop-filter: blur(10px);
    z-index: 100;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    opacity: 0;
    transition: opacity 0.4s ease;
  }

  .pdf-modal.active { display: flex; opacity: 1; }

  .pdf-container {
    background: white;
    border-radius: 20px;
    width: 100%;
    max-width: 1000px;
    height: 90vh;
    display: flex;
    flex-direction: column;
    box-shadow: 0 30px 80px rgba(0, 0, 0, 0.4);
    transform: scale(0.85);
    transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    overflow: hidden;
  }

  .pdf-modal.active .pdf-container { transform: scale(1); }

  .pdf-header {
    background: linear-gradient(135deg, var(--rose-pale), var(--rose-poudre));
    padding: 1rem 1.5rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid rgba(232, 74, 106, 0.2);
  }

  .pdf-header-title {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.4rem;
    color: var(--rouge-profond);
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }

  .pdf-header-actions {
    display: flex;
    gap: 0.5rem;
    align-items: center;
  }

  .pdf-download {
    background: rgba(255, 255, 255, 0.6);
    border: none;
    padding: 0.5rem 1rem;
    border-radius: 25px;
    cursor: pointer;
    font-size: 0.85rem;
    color: var(--rouge-profond);
    font-family: inherit;
    font-weight: 500;
    text-decoration: none;
    transition: all 0.3s ease;
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
  }

  .pdf-download:hover {
    background: var(--rose-vif);
    color: white;
  }

  .pdf-close {
    background: rgba(255, 255, 255, 0.6);
    border: none;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1.5rem;
    color: var(--rouge-profond);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    line-height: 1;
  }

  .pdf-close:hover {
    background: var(--rose-vif);
    color: white;
    transform: rotate(90deg);
  }

  .pdf-viewer {
    flex: 1;
    width: 100%;
    border: none;
    background: #f5f5f5;
  }

  @media (max-width: 600px) {
    body { padding: 2rem 1rem; }
    .documents { gap: 1.5rem; }
    .pdf-container { height: 95vh; border-radius: 15px; }
    .pdf-header-title { font-size: 1.1rem; }
    .pdf-download { padding: 0.4rem 0.7rem; font-size: 0.75rem; }
  }
</style>
</head>
<body>

  <div class="hearts-bg" id="heartsBg"></div>

  <div class="content">
    <header class="header">
      <div class="ornement">♡ ◦ ♡ ◦ ♡</div>
      <h1 class="main-title">Pour toi,<br><span class="accent">Amélie</span></h1>
      <p class="subtitle">Parce que tu mérites bien plus qu'un simple CV.<br>Voici un petit dossier fait avec soin, rien que pour toi.</p>
    </header>

    <main class="documents">
      <button class="doc-card" onclick="openPdf('cv-amelie.pdf', 'Mon CV')">
        <div class="doc-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
            <polyline points="10 9 9 9 8 9"/>
          </svg>
        </div>
        <h2 class="doc-title">Mon CV</h2>
        <p class="doc-subtitle">Curriculum Vitae</p>
        <span class="doc-action">Ouvrir le document</span>
      </button>

      <button class="doc-card" onclick="openPdf('lettre-amelie.pdf', 'Lettre de motivation')">
        <div class="doc-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
        </div>
        <h2 class="doc-title">Lettre de motivation</h2>
        <p class="doc-subtitle">Écrite avec le cœur</p>
        <span class="doc-action">Ouvrir le document</span>
      </button>
    </main>

    <p class="footer-message">Merci d'avoir pris le temps de me lire</p>
  </div>

  <!-- Animation d'ouverture avec gros cœur -->
  <div class="opening-animation" id="openingAnim">
    <div class="big-heart-wrapper" id="bigHeartWrapper">
      <svg class="big-heart" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="bigHeartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#e84a6a"/>
            <stop offset="100%" style="stop-color:#8a1538"/>
          </linearGradient>
        </defs>
        <path d="M50,85 C50,85 15,60 15,35 C15,22 25,15 35,15 C42,15 47,19 50,25 C53,19 58,15 65,15 C75,15 85,22 85,35 C85,60 50,85 50,85 Z" 
              fill="url(#bigHeartGrad)"/>
      </svg>
    </div>
  </div>

  <!-- Modal lecteur PDF -->
  <div class="pdf-modal" id="pdfModal">
    <div class="pdf-container">
      <div class="pdf-header">
        <div class="pdf-header-title">
          <span>♡</span>
          <span id="pdfTitle">Document</span>
        </div>
        <div class="pdf-header-actions">
          <a class="pdf-download" id="pdfDownload" href="" download>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            Télécharger
          </a>
          <button class="pdf-close" onclick="closePdf()" aria-label="Fermer">×</button>
        </div>
      </div>
      <iframe class="pdf-viewer" id="pdfViewer" src=""></iframe>
    </div>
  </div>

<script>
  // ===== Cœurs flottants en arrière-plan =====
  const heartsBg = document.getElementById('heartsBg');
  const heartSymbols = ['♥', '♡', '❤'];
  
  function createHeart() {
    const heart = document.createElement('div');
    heart.className = 'heart-float';
    heart.textContent = heartSymbols[Math.floor(Math.random() * heartSymbols.length)];
    
    const size = Math.random() * 25 + 12;
    const startX = Math.random() * 100;
    const duration = Math.random() * 8 + 8;
    const delay = Math.random() * 2;
    const opacity = Math.random() * 0.4 + 0.2;
    const drift = (Math.random() - 0.5) * 200;
    
    heart.style.left = startX + 'vw';
    heart.style.bottom = '-50px';
    heart.style.fontSize = size + 'px';
    heart.style.opacity = opacity;
    heart.style.color = Math.random() > 0.5 ? '#e84a6a' : '#f5b8c4';
    
    heart.animate([
      { transform: 'translate(0, 0) rotate(0deg)', opacity: 0 },
      { transform: `translate(${drift * 0.3}px, -30vh) rotate(${drift}deg)`, opacity: opacity, offset: 0.1 },
      { transform: `translate(${drift * 0.7}px, -70vh) rotate(${drift * 2}deg)`, opacity: opacity, offset: 0.7 },
      { transform: `translate(${drift}px, -110vh) rotate(${drift * 3}deg)`, opacity: 0 }
    ], {
      duration: duration * 1000,
      delay: delay * 1000,
      easing: 'linear'
    });
    
    heartsBg.appendChild(heart);
    setTimeout(() => heart.remove(), (duration + delay) * 1000);
  }
  
  for (let i = 0; i < 15; i++) setTimeout(createHeart, i * 200);
  setInterval(createHeart, 600);
  
  // ===== Cœurs qui suivent le curseur =====
  let lastTime = 0;
  document.addEventListener('mousemove', (e) => {
    const now = Date.now();
    if (now - lastTime < 80) return;
    lastTime = now;
    
    const heart = document.createElement('div');
    heart.className = 'cursor-heart';
    heart.textContent = '♡';
    heart.style.left = e.clientX + 'px';
    heart.style.top = e.clientY + 'px';
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 1000);
  });

  // ===== OUVERTURE DU PDF AVEC ANIMATION DE CŒUR =====
  function openPdf(filename, title) {
    const anim = document.getElementById('openingAnim');
    const modal = document.getElementById('pdfModal');
    const viewer = document.getElementById('pdfViewer');
    const pdfTitle = document.getElementById('pdfTitle');
    const pdfDownload = document.getElementById('pdfDownload');
    const heartWrapper = document.getElementById('bigHeartWrapper');
    
    // Reset l'animation du gros cœur
    heartWrapper.style.animation = 'none';
    void heartWrapper.offsetHeight;
    heartWrapper.style.animation = '';
    
    // Lance l'animation
    anim.classList.add('active');
    
    // Burst de petits cœurs autour
    for (let i = 0; i < 24; i++) {
      const burst = document.createElement('div');
      burst.className = 'burst-heart';
      burst.textContent = ['♡', '♥', '❤'][Math.floor(Math.random() * 3)];
      const angle = (Math.PI * 2 * i) / 24 + Math.random() * 0.3;
      const distance = 250 + Math.random() * 200;
      burst.style.setProperty('--bx', Math.cos(angle) * distance + 'px');
      burst.style.setProperty('--by', Math.sin(angle) * distance + 'px');
      burst.style.fontSize = (18 + Math.random() * 25) + 'px';
      burst.style.color = Math.random() > 0.5 ? '#e84a6a' : '#8a1538';
      burst.style.animationDelay = (Math.random() * 0.2) + 's';
      anim.appendChild(burst);
      setTimeout(() => burst.remove(), 1600);
    }
    
    // Après l'animation, on ouvre le modal
    setTimeout(() => {
      pdfTitle.textContent = title;
      viewer.src = filename;
      pdfDownload.href = filename;
      pdfDownload.setAttribute('download', filename);
      modal.classList.add('active');
      anim.classList.remove('active');
    }, 1200);
  }

  function closePdf() {
    const modal = document.getElementById('pdfModal');
    const viewer = document.getElementById('pdfViewer');
    modal.classList.remove('active');
    setTimeout(() => { viewer.src = ''; }, 400);
  }

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closePdf();
  });

  document.getElementById('pdfModal').addEventListener('click', (e) => {
    if (e.target.id === 'pdfModal') closePdf();
  });
</script>

</body>
</html>
